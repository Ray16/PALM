# Multi-molecule SDF file — 1D molecule splitting
input_file: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/data/molecules.sdf"
output_dir: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/output/sdf_molecules"
dataset_name: "sdf_molecules"

e1:
  name: "compound"
  type: "molecule"
  extract:
    column: "smiles"
  feature_sets:
    - rdkit_descriptors

splitting:
  techniques: [R, C1e]
  splits: [8, 2]
  names: ["train", "test"]
  max_sec: 120
  solver: "SCIP"
