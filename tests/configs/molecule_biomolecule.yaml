# Davis Drug-Target Interaction — molecule (drug) + biomolecule (protein)
input_file: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/data/davis/interactions.csv"
output_dir: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/output/davis"
dataset_name: "davis"

e:
  name: "drug"
  type: "molecule"
  extract:
    column: "smiles"
  feature_sets:
    - rdkit_descriptors
    - physicochemical

f:
  name: "protein"
  type: "biomolecule"
  extract:
    column: "sequence"
  feature_sets:
    - sequence_properties

splitting:
  techniques: [R, I2]
  splits: [8, 2]
  names: ["train", "test"]
  max_sec: 120
  solver: "SCIP"
