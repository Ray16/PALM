# BBBP (Blood-Brain Barrier Penetration) — 2050 molecules, 1D splitting
input_file: "PALM/tests/data/bbbp/bbbp.csv"
output_dir: "PALM/tests/output/bbbp"
dataset_name: "bbbp"

e:
  name: "compound"
  type: "molecule"
  extract:
    column: "smiles"
  feature_sets:
    - rdkit_descriptors
    - physicochemical
    - morgan_fingerprint

splitting:
  techniques: [R, I1e, C1e]
  splits: [8, 2]
  names: ["train", "test"]
  max_sec: 600
  solver: "SCIP"
