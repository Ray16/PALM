# FASTA protein sequences — 1D biomolecule splitting
input_file: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/data/sequences.fasta"
output_dir: "/nfs/lambda_stor_01/homes/rzhu/PALM/tests/output/fasta_sequences"
dataset_name: "fasta_sequences"

e1:
  name: "protein"
  type: "biomolecule"
  extract:
    column: "sequence"
  feature_sets:
    - sequence_properties

splitting:
  techniques: [R, C1e]
  splits: [8, 2]
  names: ["train", "test"]
  max_sec: 120
  solver: "SCIP"
